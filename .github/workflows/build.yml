name: Build APK

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'

      - name: Baixar modelo Piper Cadu completo
        run: |
          # Baixar o tarball completo do modelo (inclui .onnx, .onnx.json e espeak-ng-data)
          wget --no-check-certificate \
            "https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/vits-piper-pt_BR-cadu-medium.tar.bz2" \
            -O /tmp/cadu.tar.bz2
          mkdir -p assets/voices
          tar -xjf /tmp/cadu.tar.bz2 -C /tmp/
          # Copiar arquivos necessários
          cp /tmp/vits-piper-pt_BR-cadu-medium/pt_BR-cadu-medium.onnx assets/voices/
          cp /tmp/vits-piper-pt_BR-cadu-medium/pt_BR-cadu-medium.onnx.json assets/voices/
          cp /tmp/vits-piper-pt_BR-cadu-medium/tokens.txt assets/voices/
          # Copiar espeak-ng-data inteiro
          cp -r /tmp/vits-piper-pt_BR-cadu-medium/espeak-ng-data assets/voices/

      - name: Verificar antes
        run: |
          echo "=== ANTES DA SUBSTITUIÇÃO ==="
          grep -n "elevenlabsKey" lib/helper/global.dart
          echo "=============================="

      - name: Configurar chaves
        run: |
          sed -i "s|String elevenlabsKey = '';|String elevenlabsKey = '${{ secrets.ELEVENLABS_API_KEY }}';|g" lib/helper/global.dart
          sed -i "s/String apiKey = '';/String apiKey = '${{ secrets.GEMINI_KEY }}';/" lib/helper/global.dart
          sed -i "s/String claudeKey = '';/String claudeKey = '${{ secrets.CLAUDE_KEY }}';/" lib/helper/global.dart
          sed -i "s/String groqKey = '';/String groqKey = '${{ secrets.GROQ_KEY }}';/" lib/helper/global.dart
          sed -i "s/String deepseekKey = '';/String deepseekKey = '${{ secrets.DEEPSEEK_KEY }}';/" lib/helper/global.dart
          sed -i "s/String openrouterKey = '';/String openrouterKey = '${{ secrets.OPENROUTER_KEY }}';/" lib/helper/global.dart
          sed -i "s/String cloudflareKey = '';/String cloudflareKey = '${{ secrets.CLOUDFLARE_KEY }}';/" lib/helper/global.dart
          sed -i "s/String openaiKey = '';/String openaiKey = '${{ secrets.OPENAI_KEY }}';/" lib/helper/global.dart

      - name: Verificar depois
        run: |
          echo "=== DEPOIS DA SUBSTITUIÇÃO ==="
          grep -n "elevenlabsKey" lib/helper/global.dart
          echo "=============================="

      - name: Get packages
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Listar APKs gerados
        if: always()
        run: find . -name "*.apk" 2>/dev/null || echo "Nenhum APK encontrado"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-assistant-apk
          path: "**/*.apk"
