name: ai_assistant
description: An AI Assistant (ChatBot, Image Generator & Language Translator) App Based on ChatGPT developed by Harsh H. Rajpurohit 

publish_to: 'none' 

version: 1.0.2+2

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.0.0

  cupertino_icons: ^1.0.8

  lottie: ^3.1.2

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  path_provider: ^2.1.2
  path: ^1.9.0

  get: ^4.6.6

  flutter_animate: ^4.5.0
  animated_text_kit: ^4.2.2

  http: ^1.2.2
  google_fonts: ^6.2.1
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.0
  just_audio: ^0.9.40

  dart_openai: ^5.1.0
  cached_network_image: ^3.3.1

  translator_plus: ^1.0.1

  image_gallery_saver_plus: ^5.0.0

  share_plus: ^12.0.2

  sherpa_onnx: ^1.12.29

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/sounds/
    - assets/voices/pt_BR-cadu-medium.onnx.json
    - assets/voices/tokens.txt
